  <style>
/* ============================================================
   Diego Vicente — Nanopigmentação | Landing Page
   Design system: editorial luxo, clínico-premium
   ============================================================ */

:root {
  --bg: #FBFBFA;
  --bg-alt: #F1F1EA;
  --ink: #1E1F22;
  --ink-soft: #6B6D66;
  --ink-faint: #9A9B93;
  --line: #E6E3DA;
  --accent: #5E6B54;
  --accent-deep: #434D3B;
  --accent-soft: #E5E8DE;
  --white: #FFFFFF;

  --font-display: 'Cormorant Garamond', Georgia, serif;
  --font-body: 'Plus Jakarta Sans', system-ui, sans-serif;

  --maxw: 1240px;
  --pad: clamp(20px, 5vw, 72px);
  --radius: 4px;

  --shadow-sm: 0 1px 2px rgba(30,31,34,0.04), 0 4px 14px rgba(30,31,34,0.05);
  --shadow-md: 0 10px 40px rgba(30,31,34,0.08);
  --shadow-lg: 0 24px 70px rgba(30,31,34,0.12);
  --ease: cubic-bezier(0.22, 1, 0.36, 1);
}

* { box-sizing: border-box; }

html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }

body {
  margin: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-body);
  font-size: 17px;
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

.app { overflow-x: clip; }

h1, h2, h3, h4 {
  font-family: var(--font-display);
  font-weight: 500;
  color: var(--ink);
  margin: 0;
  letter-spacing: -0.01em;
  text-wrap: balance;
}
.display {
  font-size: clamp(2.5rem, 6vw, 4.9rem);
  line-height: 1.06;
  font-weight: 500;
  padding-bottom: 0.06em;
}
.h-section {
  font-size: clamp(2rem, 4.4vw, 3.4rem);
  line-height: 1.08;
}
p { margin: 0; text-wrap: pretty; }

.eyebrow {
  font-family: var(--font-body);
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--accent);
  display: inline-flex;
  align-items: center;
  gap: 0.6em;
}
.eyebrow::before {
  content: "";
  width: 26px; height: 1px;
  background: var(--accent);
  opacity: 0.55;
  display: inline-block;
}
.eyebrow.center::after {
  content: "";
  width: 26px; height: 1px;
  background: var(--accent);
  opacity: 0.55;
  display: inline-block;
}
.eyebrow.center::before { display: inline-block; }

.lead {
  font-size: clamp(1.05rem, 1.6vw, 1.2rem);
  color: var(--ink-soft);
  line-height: 1.7;
}
.serif-accent { font-family: var(--font-display); font-style: italic; }

.section { padding: clamp(64px, 9vw, 130px) var(--pad); }
.section.tight { padding-top: clamp(40px, 5vw, 70px); }
.container { max-width: var(--maxw); margin: 0 auto; }
.narrow { max-width: 760px; }

.bg-alt { background: var(--bg-alt); }

.btn {
  font-family: var(--font-body);
  font-size: 0.95rem;
  font-weight: 600;
  letter-spacing: 0.01em;
  padding: 16px 30px;
  border-radius: 999px;
  border: 1.5px solid transparent;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
  transition: all 0.4s var(--ease);
  white-space: nowrap;
  line-height: 1;
}
.btn .ico {
  display: inline-flex;
  transition: transform 0.4s var(--ease);
}
.btn:hover .ico { transform: translate(3px, -3px); }

.btn-primary {
  background: var(--accent);
  color: #fff;
  box-shadow: var(--shadow-sm);
}
.btn-primary:hover { background: var(--accent-deep); box-shadow: var(--shadow-md); transform: translateY(-2px); }

.btn-ghost {

  color: var(--ink);
  border-color: var(--line);
}
.btn-ghost:hover { border-color: var(--ink); background: rgba(30,31,34,0.02); }

.btn-light { background: #fff; color: var(--accent-deep); box-shadow: var(--shadow-md); }
.btn-light:hover { transform: translateY(-2px); }
.btn-outline-light { background: transparent; color: #fff; border-color: rgba(255,255,255,0.5); }
.btn-outline-light:hover { border-color: #fff; background: rgba(255,255,255,0.1); }

.cta-outline .btn-primary {
  background: transparent;
  color: var(--accent-deep);
  border-color: var(--accent);
}
.cta-outline .btn-primary:hover { background: var(--accent); color: #fff; }

.cta-square .btn { border-radius: 4px; }

.cta-block .btn-primary {
  border-radius: 4px;
  background: var(--ink);
}
.cta-block .btn-primary:hover { background: var(--accent-deep); }

.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 50;
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px var(--pad);

}
.nav.scrolled {

  border-bottom: 1px solid var(--line);

}
.brand { display: flex; align-items: baseline; gap: 10px; text-decoration: none; color: var(--ink); }
.brand .mark {
  font-family: var(--font-display);
  font-size: 1.55rem;
  font-weight: 600;
  letter-spacing: 0.01em;
  line-height: 1;
}
.brand .sub {
  font-size: 0.62rem; font-weight: 600; letter-spacing: 0.26em;

}
.nav-links { display: flex; align-items: center; gap: 34px; }
.nav-links a {

}

@media (max-width: 900px) {
  .nav-links { display: none; }
  .nav .nav-cta { display: none; }

    display: inline-flex; flex-direction: column; gap: 5px;

  }

}

.hero { padding-top: clamp(120px, 16vh, 180px); }
.hero-split {
  display: grid;
  grid-template-columns: 1.05fr 0.95fr;
  gap: clamp(32px, 5vw, 72px);

}

.hero-centered { text-align: center; display: flex; flex-direction: column; align-items: center; }

.hero-centered .lead { margin-top: 24px; }
.hero-centered .hero-actions { justify-content: center; }

.hero-overlay { position: relative; border-radius: var(--radius); overflow: hidden; min-height: 80vh; display: flex; align-items: flex-end; }
.hero-overlay .ph { position: absolute; inset: 0; height: 100%; }
.hero-overlay-scrim {
  position: absolute; inset: 0;

.hero-overlay-copy .display, .hero-overlay-copy .lead { color: #fff; }

.hero-overlay-copy .eyebrow::before, .hero-overlay-copy .eyebrow::after { background: #fff; }

@media (max-width: 880px) {
  .hero-split { grid-template-columns: 1fr; gap: 36px; }
  .hero-media { order: -1; }
}

.ph {
  position: relative;
  border-radius: var(--radius);
  overflow: hidden;
  background-color: var(--accent-soft);
  background-image: repeating-linear-gradient(
    -45deg,
    transparent 0, transparent 11px,
    rgba(30,31,34,0.035) 11px, rgba(30,31,34,0.035) 12px
  );
  display: flex; align-items: center; justify-content: center;
  color: var(--accent-deep);
}
.ph::after {
  content: attr(data-label);
  font-family: 'Plus Jakarta Sans', monospace;
  font-size: 0.66rem;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  opacity: 0.62;
  padding: 8px 14px;
  border: 1px dashed currentColor;
  border-radius: 100px;
  text-align: center;
  max-width: 80%;
}
.ph.portrait { aspect-ratio: 4 / 5; }
.ph.tall { aspect-ratio: 3 / 4.4; }
.ph.square { aspect-ratio: 1; }
.ph.wide { aspect-ratio: 16 / 10; }

.hero-frame { box-shadow: var(--shadow-lg); }

.photo { position: relative; border-radius: var(--radius); overflow: hidden; background: var(--accent-soft); }
.photo img { display: block; width: 100%; height: 100%; object-fit: cover; }
.photo.portrait { aspect-ratio: 4/5; }
.photo.tall { aspect-ratio: 3/4.4; }
.photo.square { aspect-ratio: 1; }
.photo.wide { aspect-ratio: 16/10; }
.photo.full { height: 100%; }
.photo .tagline {
  position: absolute; left: 16px; bottom: 16px; z-index: 2;
  font-size: 0.66rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase;
  background: rgba(255,255,255,0.92); color: var(--ink); padding: 7px 13px; border-radius: 100px;
  backdrop-filter: blur(6px);
}

.float-card {
  position: absolute; left: -26px; bottom: 30px;
  background: var(--white);
  padding: 18px 22px;
  border-radius: var(--radius);

}
.float-card .dot { width: 38px; height: 38px; border-radius: 50%; background: var(--accent-soft); display: grid; place-items: center; color: var(--accent-deep); flex: none; }
.float-card .ttl { font-size: 0.82rem; font-weight: 700; line-height: 1.2; }
.float-card .desc { font-size: 0.72rem; color: var(--ink-soft); }
@media (max-width: 880px) { .float-card { left: 12px; } }

.badges {
  margin: 0 auto;
  max-width: var(--maxw);
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
  position: relative;
  z-index: 5;
}
.badge {
  padding: 26px 30px;
  display: flex; align-items: center; gap: 16px;
  border-right: 1px solid var(--line);
}
.badge:last-child { border-right: none; }
.badge .bico { width: 30px; height: 30px; flex: none; color: var(--accent); }

.badge .bttl { font-family: var(--font-display); font-size: 1.18rem; line-height: 1.1; }
@media (max-width: 760px) {
  .badges { grid-template-columns: 1fr; }
  .badge { border-right: none; border-bottom: 1px solid var(--line); }
  .badge:last-child { border-bottom: none; }
}

.creds { display: flex; align-items: center; justify-content: center; gap: clamp(28px, 6vw, 80px); flex-wrap: wrap; }
.creds .cl-label { font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-faint); }
.cred-logo { display: flex; flex-direction: column; align-items: center; gap: 4px; opacity: 0.8; transition: opacity 0.3s; }
.cred-logo:hover { opacity: 1; }
.cred-logo .cl-name { font-family: var(--font-display); font-size: 1.35rem; font-weight: 600; }
.cred-logo .cl-sub { font-size: 0.62rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-faint); }

.sec-head { max-width: 720px; }
.sec-head.center { margin: 0 auto; text-align: center; }
.sec-head .h-section { margin-top: 18px; }
.sec-head .lead { margin-top: 18px; }

.tabs-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 40px; border-bottom: 1px solid var(--line); }
.tab {
  font-family: var(--font-body);
  background: none; border: none; cursor: pointer;
  padding: 16px 22px 18px;
  font-size: 1rem; font-weight: 600; color: var(--ink-faint);

  display: flex; align-items: center; gap: 10px;
}
.tab .tnum { font-family: var(--font-display); font-size: 0.85rem; opacity: 0.6; }
.tab:hover { color: var(--ink-soft); }
.tab.active { color: var(--ink); }
.tab.active::after {
  content: ""; position: absolute; left: 0; right: 0; bottom: -1px; height: 2px; background: var(--accent);
}
.tab-panel {
  display: grid; grid-template-columns: 0.95fr 1.05fr; gap: clamp(32px, 5vw, 64px);
  align-items: center; padding-top: 48px;
  animation: fade-up 0.6s var(--ease);
}
@keyframes fade-up { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
.tab-panel .svc-title { font-size: clamp(1.8rem, 3vw, 2.6rem); line-height: 1.05; }
.tab-panel .svc-desc { margin-top: 20px; color: var(--ink-soft); }
.svc-list { margin-top: 28px; display: flex; flex-direction: column; gap: 2px; }
.svc-list .li { display: flex; gap: 14px; padding: 14px 0; border-top: 1px solid var(--line); align-items: flex-start; }

@media (max-width: 880px) {

  .tab-panel .svc-media { order: -1; }
  .tabs-bar { overflow-x: auto; flex-wrap: nowrap; -webkit-overflow-scrolling: touch; }

}

.filter-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 36px; }
.filter-chip {
  font-family: var(--font-body); font-size: 0.85rem; font-weight: 600;
  padding: 9px 20px; border-radius: 999px; cursor: pointer;

  transition: all 0.3s var(--ease);
}
.filter-chip:hover { border-color: var(--accent); color: var(--ink); }
.filter-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

.ba-wrap { margin-top: 40px; }
.ba {
  position: relative; width: 100%; aspect-ratio: 4/3; border-radius: var(--radius);
  overflow: hidden; user-select: none; cursor: ew-resize; box-shadow: var(--shadow-md);
  touch-action: none;
}
.ba .ba-layer { position: absolute; inset: 0; }
.ba .ba-after { z-index: 1; }
.ba .ba-before { z-index: 2; }
.ba .ba-tag {
  position: absolute; top: 16px; z-index: 4;

.ba .ba-tag.before-tag { left: 16px; }

.gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 16px; }

}

.about-grid { display: grid; grid-template-columns: 1fr 1.1fr; gap: clamp(36px, 6vw, 80px); align-items: center; }

.about-stats { display: flex; gap: clamp(24px,4vw,48px); margin-top: 40px; flex-wrap: wrap; }

.sign { font-family: var(--font-display); font-style: italic; font-size: 2.1rem; margin-top: 30px; color: var(--accent-deep); }

.steps { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; margin-top: 56px; }

.faq-grid { display: grid; grid-template-columns: 0.8fr 1.2fr; gap: clamp(36px,5vw,72px); align-items: start; }
.faq-list { border-top: 1px solid var(--line); }
.faq-item { border-bottom: 1px solid var(--line); }
.faq-q {

  padding: 26px 0; display: flex; justify-content: space-between; gap: 24px; align-items: center;
  font-family: var(--font-display); font-size: 1.3rem; color: var(--ink); line-height: 1.2;
}
.faq-ico { flex: none; width: 26px; height: 26px; position: relative; transition: transform 0.4s var(--ease); }

function Btn({ children, variant = "primary", href, withArrow, arrowType = "arrow", className = "", ...rest }) {

  return href

    : <button className={cls} {...rest}>{inner}</button>;
}

function useReveal() {
  const ref = useRef(null);
  useEffect(() => {
    const els = ref.current ? ref.current.querySelectorAll(".reveal") : [];
    if (!("IntersectionObserver" in window)) { els.forEach(e=>e.classList.add("in")); return; }
    const io = new IntersectionObserver((ents) => {
      ents.forEach(e => { if (e.isIntersecting) { e.target.classList.add("in"); io.unobserve(e.target); } });
    }, { threshold: 0.12, rootMargin: "0px 0px -8% 0px" });
    els.forEach(e => io.observe(e));
    return () => io.disconnect();
  }, []);
  return ref;
}

function BeforeAfter({ data }) {
  const [pos, setPos] = useState(56);
  const ref = useRef(null);
  const dragging = useRef(false);
  const move = (clientX) => {
    if (!ref.current) return;
    const r = ref.current.getBoundingClientRect();
    let p = ((clientX - r.left) / r.width) * 100;
    setPos(Math.max(2, Math.min(98, p)));
  };
  return (
    <div className="ba" ref={ref}
      onPointerDown={(e) => { dragging.current = true; e.currentTarget.setPointerCapture(e.pointerId); move(e.clientX); }}
      onPointerMove={(e) => { if (dragging.current) move(e.clientX); }}
      onPointerUp={() => { dragging.current = false; }}
      onPointerCancel={() => { dragging.current = false; }}>
      <div className="ba-layer ba-after">
        {data.after
          ? <img src={data.after} alt="Resultado depois" style={{ objectPosition: data.afterPos }} />
          : <Ph className="full" label="Depois — adicione a foto" />}
      </div>
      <span className="ba-tag after-tag">Depois</span>
      <div className="ba-layer ba-before" style={{ clipPath: `inset(0 ${100 - pos}% 0 0)` }}>
        <Ph className="full" label="Antes — adicione a foto" />
      </div>
      <span className="ba-tag before-tag">Antes</span>
      <div className="ba-handle" style={{ left: pos + "%" }}>
        <div className="ba-knob"><Ico.drag /></div>
      </div>
    </div>
  );
}
